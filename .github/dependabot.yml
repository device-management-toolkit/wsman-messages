version: 2
updates:
  # Maintain dependencies for npm modules
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    # codeql-action's sub-actions release in lockstep; one PR instead of four.
    groups:
      codeql-action:
        patterns:
          - 'github/codeql-action*'
