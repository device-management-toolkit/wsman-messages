# This workflow will release new versions when required using semantic-release

name: Semantic-Release CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write # @semantic-release/git pushes changelog + version bump to main
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Use Node.js 24.x
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24.x'
      - run: npm ci
      - run: npm run compile --if-present
      - run: rsync -a package.json README.md ./dist/
      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          semantic_version: 25.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.ROSIE_TOKEN }}

      - name: Publish to @open-amt-cloud-toolkit
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          NEW_RELEASE_VERSION: ${{ steps.semantic.outputs.new_release_version }}
        run: |
          echo "Publishing @open-amt-cloud-toolkit/wsman-messages@$NEW_RELEASE_VERSION"
          sed -i 's/"@device-management-toolkit\/wsman-messages"/"@open-amt-cloud-toolkit\/wsman-messages"/' dist/package.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$NEW_RELEASE_VERSION\"/" dist/package.json
          cd dist
          npm publish
