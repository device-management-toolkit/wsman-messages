---

name: Zizmor Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    permissions:
      contents: read
      security-events: write

    runs-on: ubuntu-latest

    env:
      ZIZMOR_VERSION: 1.20.0

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: false

      - name: Run Zizmor
        run: |
          uvx zizmor=="$ZIZMOR_VERSION" \
            --format sarif \
            .github \
            > zizmor_scan_report.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          sarif_file: zizmor_scan_report.sarif

      - name: Upload Zizmor report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zizmor-results
          path: zizmor_scan_report.sarif
          retention-days: 7
